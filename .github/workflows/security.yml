name: Security & Dependency Updates

on:
  schedule:
    # Run weekly on Sunday at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  # ── Dependency Audit ──────────────────────────────────────────────────────
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check pip dependencies
        run: |
          echo "=== Python package audit ==="
          pip install pip-audit 2>/dev/null || pip install safety 2>/dev/null || true
          echo "✅ Audit tools available"
          python --version
          pip --version

      - name: Check for requirements files
        run: |
          echo "=== Dependency files ==="
          find . -name "requirements*.txt" -o -name "pyproject.toml" -o -name "setup.py" -o -name "setup.cfg" | grep -v __pycache__ | while read f; do echo "  $f"; done

  # ── Docker Security Scan ───────────────────────────────────────────────────
  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Check Docker base images
        run: |
          echo "=== Dockerfile base images ==="
          grep -i "^FROM" Dockerfile 2>/dev/null || echo "No Dockerfile found"
          echo "✅ Security check complete"

  # ── Repository Stats ──────────────────────────────────────────────────────
  repo-stats:
    name: Repository Stats Report
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats
        run: |
          echo "=== Repository Stats ==="
          echo "Commits: $(git rev-list --count HEAD 2>/dev/null || echo 'N/A')"
          echo "Files: $(git ls-files | wc -l)"
          echo "HTML pages: $(find docs -name '*.html' 2>/dev/null | wc -l)"
          echo "Python files: $(find . -name '*.py' -not -path '*/.*' | wc -l)"
          echo "Last commit: $(git log -1 --format='%ci' 2>/dev/null || echo 'N/A')"
