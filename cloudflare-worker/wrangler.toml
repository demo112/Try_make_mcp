name = "try-make-mcp"
main = "worker.mjs"
compatibility_date = "2025-06-18"
workers_dev = true

# Free tier: 100,000 requests/day, 10ms CPU time per request

# KV namespace for usage tracking (production)
# Cooper: 先创建 KV → wrangler kv:namespace create USAGE_KV
# 然后取消下面的注释并填入 id:
# [[kv_namespaces]]
# binding = "USAGE_KV"
# id = "YOUR_KV_NAMESPACE_ID"

[vars]
MCP_SERVER_NAME = "try-make-mcp"
MCP_SERVER_VERSION = "2.0.0"

# Stripe Checkout URL (Cooper 注册 Stripe 后替换)
STRIPE_CHECKOUT_URL = "https://buy.stripe.com/YOUR_LINK_HERE"

# Cooper: 敏感信息用 secrets 设置，不要写在这里:
# wrangler secret put STRIPE_SECRET_KEY
# wrangler secret put STRIPE_PRICE_ID
# wrangler secret put VALID_API_KEYS
